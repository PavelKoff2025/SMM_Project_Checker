[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "migrations",
    "instance",
    "uploads",
    ".ruff_local",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # warnings
    "I",   # isort
    "B",   # bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (line-length is the cap)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning:flask_limiter",
]
