{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-trophy me-1"></i>Рейтинг проектов</h4>
</div>

<div id="loadingState" class="text-center py-5">
  <div class="spinner-border text-primary mb-3" role="status"></div>
  <p class="text-muted">Загрузка рейтинга...</p>
</div>

<div id="emptyState" class="d-none text-center py-5">
  <i class="bi bi-emoji-neutral text-muted" style="font-size: 3rem;"></i>
  <h5 class="mt-3 text-muted">Завершённых проектов пока нет</h5>
  <a href="{{ url_for('checker.upload_page') }}" class="btn btn-dark mt-2">
    <i class="bi bi-cloud-upload me-1"></i>Загрузить проект
  </a>
</div>

<div id="tableContainer" class="d-none">
  <div class="table-responsive">
    <table class="table table-hover align-middle bg-white rounded shadow-sm">
      <thead class="table-dark">
        <tr>
          <th style="width:60px">#</th>
          <th>Проект</th>
          <th>Студент</th>
          <th style="width:120px">Оценка</th>
          <th style="width:100px">Дата</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody id="ratingBody"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  async function loadRating() {
    try {
      const resp = await fetch('{{ url_for("checker.rating") }}');
      const data = await resp.json();

      document.getElementById('loadingState').classList.add('d-none');

      if (!data.checks || data.checks.length === 0) {
        document.getElementById('emptyState').classList.remove('d-none');
        return;
      }

      document.getElementById('tableContainer').classList.remove('d-none');
      const tbody = document.getElementById('ratingBody');

      let prevGrade = null;
      let rank = 0;

      data.checks.forEach((c, i) => {
        const grade = c.grade != null && c.grade !== '' ? parseFloat(c.grade) : null;

        if (grade !== prevGrade) {
          rank = i + 1;
          prevGrade = grade;
        }

        const tr = document.createElement('tr');

        const tdRank = document.createElement('td');
        tdRank.className = 'fw-bold text-center';
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        tdRank.innerHTML = typeof medal === 'number' ? '<span class="text-muted">' + medal + '</span>' : medal;
        tr.appendChild(tdRank);

        const tdName = document.createElement('td');
        tdName.className = 'small';
        const link = document.createElement('a');
        link.href = '/check/' + c.id + '/report';
        link.className = 'text-decoration-none fw-medium';
        link.textContent = c.filename;
        tdName.appendChild(link);
        tr.appendChild(tdName);

        const tdStudent = document.createElement('td');
        tdStudent.className = 'small text-muted';
        tdStudent.textContent = c.username;
        tr.appendChild(tdStudent);

        const tdGrade = document.createElement('td');
        const bar = grade != null ? '█'.repeat(Math.round(grade)) + '░'.repeat(10 - Math.round(grade)) : '—';
        tdGrade.innerHTML = '<span class="fw-medium">' + (grade != null ? grade.toFixed(1) + '/10' : '—') + '</span>';
        tr.appendChild(tdGrade);

        const tdDate = document.createElement('td');
        tdDate.className = 'small text-muted';
        tdDate.textContent = c.created_at ? new Date(c.created_at).toLocaleDateString('ru-RU') : '—';
        tr.appendChild(tdDate);

        const tdAction = document.createElement('td');
        tdAction.innerHTML = '<a href="/check/' + c.id + '/report" class="btn btn-sm btn-outline-dark"><i class="bi bi-eye"></i></a>';
        tr.appendChild(tdAction);

        tbody.appendChild(tr);
      });
    } catch (_) {
      document.getElementById('loadingState').innerHTML = `
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <h5 class="mt-3 text-muted">Не удалось загрузить рейтинг</h5>
        <button class="btn btn-outline-dark mt-2" onclick="location.reload()">Повторить</button>
      `;
    }
  }

  loadRating();
</script>
{% endblock %}
